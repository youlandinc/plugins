name: Bug Report
description: Report an issue with a MongoDB Agent Skill
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue! Please provide as much detail as possible to help us reproduce and fix the problem.

  - type: input
    id: skill-name
    attributes:
      label: Skill Name
      description: Which MongoDB Agent Skill is this issue related to?
      placeholder: e.g., mongodb-query-optimization
    validations:
      required: true

  - type: textarea
    id: task-description
    attributes:
      label: Task Description
      description: What were you trying to accomplish? Please provide your prompt or describe the task, removing any sensitive information.
      placeholder: "I was trying to..."
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "I expected the skill to..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Instead, the skill..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Please provide clear steps to reproduce this issue
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: agent-platform
    attributes:
      label: Agent Platform
      description: Which AI agent or coding assistant are you using?
      placeholder: e.g., Augment, Claude Code, Cursor, Cline, GitHub Copilot, etc.
    validations:
      required: true

  - type: input
    id: llm-model
    attributes:
      label: LLM Model
      description: Which language model is your agent using?
      placeholder: e.g., Claude 4.5 Sonnet, GPT-5.2, GPT-4o, Claude 4.6 Opus, etc.
    validations:
      required: true

  - type: input
    id: mongodb-version
    attributes:
      label: MongoDB Version
      description: What version of MongoDB are you working with?
      placeholder: e.g., 8.0.4, 7.0.12, 6.0.16
    validations:
      required: false

  - type: input
    id: skill-version
    attributes:
      label: Skill Version
      description: Which version of the skill are you using? (commit hash, tag, or "latest from main")
      placeholder: e.g., abc1234, v1.0.0, latest from main
    validations:
      required: false

  - type: textarea
    id: environment-details
    attributes:
      label: Environment Details
      description: Please provide relevant environment information
      placeholder: |
        - Operating System:
        - Programming Language/Driver:
        - Driver Version:
        - Other relevant details:
    validations:
      required: false

  - type: textarea
    id: configuration-tools
    attributes:
      label: Configuration & Tools
      description: Any relevant configuration details or tools that were invoked during skill execution?
      placeholder: "e.g., MongoDB Atlas, specific mongosh version, deployment configuration, etc."
    validations:
      required: false

  - type: textarea
    id: error-messages
    attributes:
      label: Error Messages or Logs
      description: Please include any error messages, stack traces, or relevant log output
      render: shell
    validations:
      required: false

  - type: textarea
    id: workarounds
    attributes:
      label: Workarounds
      description: Have you found any temporary workarounds for this issue?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or information that might be helpful
    validations:
      required: false
