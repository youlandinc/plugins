name: lint-pr-title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed conventional-commit types. Keep in sync with the
          # changelog-sections in release-please-config.json.
          types: |
            feat
            fix
            docs
            chore
            ci
            test
            refactor
            perf
            build
            revert
            style
          # An optional scope is allowed (e.g. `feat(netlify-database): ...`)
          # but not required.
          requireScope: false
