name: PR assignment

on:
  pull_request_target:
    types: [opened, edited, reopened]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: "Auto-assign PR"
        uses: pozil/auto-assign-issue@07fe6dc0e9771842b428f5739098d6140734e226 # v4.0.0
        with:
          assignees: belluru,snehshah22
          numOfAssignee: 1
          abortIfPreviousAssignees: true
