steps:
  - label: ":kiro: power-up-to-date"
    if: build.pull_request.id != null
    command: |
      ./scripts/build-power.sh
      if [ -n "$(git status --porcelain -- steering)" ]; then
        {
          echo "The Kiro \`steering/\` files are out of date with the skills."
          echo
          echo "A GitHub Action should regenerate and push these files automatically for same-repository pull requests."
          echo "If this is a fork or the action did not run, run \`./scripts/build-power.sh\` locally and commit the result."
          echo
          echo "Status:"
          echo
          echo '```'
          git status --short -- steering
          echo '```'
          echo
          echo "Diff:"
          echo
          echo '```diff'
          git diff steering
          echo '```'
        } | buildkite-agent annotate --style error --context kiro-drift
        exit 1
      fi
