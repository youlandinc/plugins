name: Test hooks

on:
  pull_request:
    paths:
      - 'hooks/**'
      - 'scripts/**'
      - '.github/workflows/test-hooks.yml'
  push:
    branches:
      - main
    paths:
      - 'hooks/**'
      - 'scripts/**'
      - '.github/workflows/test-hooks.yml'

permissions:
  contents: read

jobs:
  test-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hook regression tests
        run: bash scripts/test-hooks.sh
