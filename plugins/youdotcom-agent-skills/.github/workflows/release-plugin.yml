name: Release Plugin

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

jobs:
  release:
    name: Release youdotcom
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PUBLISH_TOKEN }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install plugin dependencies
        run: bun install
        working-directory: plugins/openclaw-youdotcom

      - name: Typecheck
        run: bunx tsc --noEmit
        working-directory: plugins/openclaw-youdotcom

      - name: Lint
        run: bunx biome check plugins/openclaw-youdotcom/*.ts

      - name: Test
        run: bun test
        working-directory: plugins/openclaw-youdotcom

      - name: Bump version
        id: bump-version
        env:
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          CURRENT=$(jq -r '.version' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping ${CURRENT} → ${NEW_VERSION}"

          # Update package.json
          jq --arg v "$NEW_VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

          # Update manifest
          jq --arg v "$NEW_VERSION" '.version = $v' openclaw.plugin.json > openclaw.plugin.json.tmp && mv openclaw.plugin.json.tmp openclaw.plugin.json
        working-directory: plugins/openclaw-youdotcom

      - name: Configure git
        if: ${{ !inputs.dry_run }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ steps.bump-version.outputs.version }}
          BUMP_TYPE: ${{ inputs.bump_type }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git add "plugins/openclaw-youdotcom/package.json" "plugins/openclaw-youdotcom/openclaw.plugin.json"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(youdotcom): ${BUMP_TYPE} version bump to ${VERSION} [skip ci]"
            git pull origin "$BRANCH" --rebase
            git push origin "HEAD:$BRANCH"
          fi

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          VERSION: ${{ steps.bump-version.outputs.version }}
          BRANCH: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          TAG="youdotcom@${VERSION}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG already exists, skipping"
          else
            gh release create "$TAG" \
              --target "$BRANCH" \
              --title "$TAG" \
              --notes "Release \`@youdotcom-oss/youdotcom@${VERSION}\`

              ## Changes
              See commit history for details.

              ## Install
              \`\`\`bash
              openclaw plugins install clawhub:@youdotcom-oss/youdotcom
              \`\`\`"
          fi

      - name: Publish to ClawHub
        if: ${{ !inputs.dry_run }}
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          VERSION: ${{ steps.bump-version.outputs.version }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          bunx clawhub login --token "${CLAWHUB_TOKEN}" --no-browser
          bunx clawhub package publish plugins/openclaw-youdotcom \
            --version "${VERSION}" \
            --source-repo "${SOURCE_REPO}" \
            --source-commit "${SOURCE_COMMIT}"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        env:
          VERSION: ${{ steps.bump-version.outputs.version }}
          BUMP_TYPE: ${{ inputs.bump_type }}
        run: |
          echo "### 🏗️ Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bump type:** ${BUMP_TYPE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Would create release:** youdotcom@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Would publish to ClawHub:** @youdotcom-oss/youdotcom@${VERSION}" >> "$GITHUB_STEP_SUMMARY"
