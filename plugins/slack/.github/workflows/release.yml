name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Don't let two release runs race on the same branch.
concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  PY_VERSION: "3.14"
  NODE_VERSION: "26"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Set up Python ${{ env.PY_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ env.PY_VERSION }}
      - name: Install Node dependencies
        run: npm install
      - name: Changesets release
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bash scripts/changeset_version.sh
          publish: npx changeset publish
          createGithubReleases: true
          commit: "chore: release"
          title: "chore: release"
          prDraft: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Get publication details
        id: release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          echo "url=$(gh release view --json url -q .url)" >> "$GITHUB_OUTPUT"
          echo "message=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | "\(.name)@\(.version)"' | paste -sd ', ' -)" >> "$GITHUB_OUTPUT"
      - name: Notify Slack
        if: steps.changesets.outputs.published == 'true'
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets.SLACK_RELEASE_ANNOUNCEMENTS_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            action_url: "${{ steps.release.outputs.url }}"
            message: "${{ steps.release.outputs.message }}"
            repository: "${{ github.repository }}"
