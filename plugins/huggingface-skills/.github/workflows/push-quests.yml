name: Sync Quests to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'quests/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install huggingface_hub
        run: |
          curl -LsSf https://hf.co/cli/install.sh -o install.sh
          echo "d0bb5e5e92432c1476e1dce0c19e0b51925f61cbc0b6ad97c3b0e5f3a9c6e5f3  install.sh" | sha256sum --check --status
          bash install.sh

      - name: Upload quests to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: hf upload hf-skills/README quests . --repo-type=space

