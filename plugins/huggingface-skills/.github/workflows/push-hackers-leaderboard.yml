name: Sync Hackers Leaderboard to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'apps/hackers-leaderboard/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Install huggingface_hub
        run: |
          curl -LsSf https://hf.co/cli/install.sh -o install.sh
          echo "b4be4c3cf278c5bb66e58e34de84da30f02dc17153f62fa7ba6e7b0c3b3e4e70  install.sh" | sha256sum -c -
          bash install.sh

      - name: Upload hackers leaderboard to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: hf upload hf-skills/hacker_leaderboard apps/hackers-leaderboard . --repo-type=space

