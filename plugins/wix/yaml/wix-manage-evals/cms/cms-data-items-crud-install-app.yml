name: cms/cms-data-items-crud-install-app
description: >-
  Verifies the agent reads the cms-data-items-crud skill and recovers from a WDE0110
  error by installing the Wix CMS app (correct appDefId) and then retrying the insert.
triggerPrompt: >-
  I'm inserting a data item into my Wix CMS collection through the REST API, but the call
  fails with error code WDE0110. What does this mean and how do I get the insert to succeed?
tags: [cms]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/cms/skills/cms-data-items-crud
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      The user hit error WDE0110 while inserting a data item into a Wix CMS collection
      and wants to know how to fix it and complete the insert.
      Intent: recognize WDE0110 as "Wix CMS (Wix Data) app not installed", install the app, then retry.

      Pass if the response:
      - explains that WDE0110 means the Wix CMS / Wix Data application is not installed on the site, AND
      - tells the user to install the Wix CMS app using appDefId `e593b0bd-b783-45b8-97c2-873d42aacaf4`
        via the Apps Installer install endpoint, AND
      - says to retry the original insert (data items insert) after the app is installed.

      Fail if the response:
      - misidentifies WDE0110 (e.g. treats it as a validation, permissions, or wrong-field error), OR
      - tells the user to enable Velo / call a velo provision endpoint to fix it (that flow was removed), OR
      - invents a different appDefId for Wix CMS, OR
      - does not mention installing the app at all.
