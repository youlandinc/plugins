name: ecommerce/ecom-pricing
description: I want to create a discount, but I also need to refund a previous discounted order.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) I want to create a discount, but I also need to refund a previous discounted order.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/pricing-promotions
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response treats the two asks as separate categories — directs the discount/coupon creation to a Pricing & Promotions resource and directs the order refund to a separate payment/refund / Get Paid / Dashboard resource — and contains no claim that refunding an order is a Pricing & Promotions action.
      Fail if the response treats refunds as a pricing-promotion action, claims a single skill covers both, or routes the refund back to a discount/coupon recipe.
      Topic-completeness beyond the two asks (ribbons, bundles, sale-scheduling, etc.) is NOT required to pass — judge the boundary, not the breadth.
