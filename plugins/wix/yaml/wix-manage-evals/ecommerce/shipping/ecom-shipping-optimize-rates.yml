name: ecommerce/shipping/optimize-rates
description: Review my current shipping rate structure and recommend changes — I'm not sure if flat or tiered makes more sense for my catalog.
triggerPrompt: For my site Gracia (331d0c05-2ab0-4edb-91a6-4078c7e500b9) Review my current shipping rate structure and recommend changes — I'm not sure if flat or tiered makes more sense for my catalog.
tags: [ecommerce]
assertions:
  - tool: ReadFullDocsArticle
    params:
      articleUrl: https://dev.wix.com/docs/api-reference/business-solutions/e-commerce/skills/shipping-optimize-rates
  - type: llm_judge
    minScore: 7
    maxTokens: 2048
    prompt: |
      Pass if the response loads the optimize-rates recipe, reads the current rates via the Shipping Options API, analyzes catalog price distribution / AOV, and recommends a concrete restructure — flat↔tiered conversion, tier-gap closure, or per-item-penalty removal — with inlined rate-sanity reasoning.
      Fail if it proposes new rates without first reading the current state, omits AOV/catalog signals, or routes the task to Pricing & Promotions.
