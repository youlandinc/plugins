name: EvalForge YAML Gate Cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]

concurrency:
  group: evalforge-yaml-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # Spec §8: cleanup is "On PR close without merge". On merge, promote handles MCP+state.
    # This prevents a race where cleanup deletes draft scenarios before promote can promote them.
    if: ${{ github.event.pull_request.merged != true && github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .action-src
      - uses: ./.action-src/.github/actions/evalforge-yaml-gate
        with:
          mode: cleanup
          github-token: ${{ secrets.GITHUB_TOKEN }}
          evalforge-url: ${{ vars.EVALFORGE_URL }}
          evalforge-project-id: ${{ vars.AUTO_SKILLS_PIPELINE_PROJECT_ID }}
          evalforge-mcp-id: ${{ vars.AUTO_SKILLS_PIPELINE_MCP_ID }}
          evalforge-app-id: ${{ secrets.AUTO_SKILLS_PIPELINE_APP_ID }}
          evalforge-app-secret: ${{ secrets.AUTO_SKILLS_PIPELINE_APP_SECRET }}
