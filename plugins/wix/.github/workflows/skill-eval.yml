name: Skill Eval

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'skills/wix-manage/references/**'
      - 'yaml/wix-manage/**'

concurrency:
  group: skill-eval-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  skill-eval:
    runs-on: ubuntu-latest
    if: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: .action-src
      - uses: ./.action-src/.github/actions/skill-eval
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          evalforge-url: ${{ vars.EVALFORGE_URL }}
          evalforge-project-id: ${{ vars.AUTO_SKILLS_PIPELINE_PROJECT_ID }}
          evalforge-agent-id: ${{ vars.AUTO_SKILLS_PIPELINE_AGENT_ID }}
          evalforge-mcp-id: ${{ vars.AUTO_SKILLS_PIPELINE_MCP_ID }}
          evalforge-app-id: ${{ secrets.AUTO_SKILLS_PIPELINE_APP_ID }}
          evalforge-app-secret: ${{ secrets.AUTO_SKILLS_PIPELINE_APP_SECRET }}
          blocking: ${{ vars.EVAL_BLOCK_MERGE }}
