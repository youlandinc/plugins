name: "astro-airflow-mcp: CI"

on:
  push:
    branches: [main]
    paths:
      - 'astro-airflow-mcp/**'
  pull_request:
    branches: [main]
    paths:
      - 'astro-airflow-mcp/**'

permissions:
  contents: read

defaults:
  run:
    working-directory: astro-airflow-mcp

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0  # Full history for hatch-vcs to read version from tags

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.0
      with:
        enable-cache: true

    - name: Install dependencies
      run: make install-dev-ci

    - name: Run CI checks
      run: make ci

  docker:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0  # Full history for hatch-vcs to read version from tags

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and test Docker image
      working-directory: astro-airflow-mcp
      run: |
        make docker-build
        docker run --rm astro-airflow-mcp python -m astro_airflow_mcp --help
