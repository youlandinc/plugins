name: "astro-airflow-mcp: Publish to PyPI"

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution packages
    runs-on: ubuntu-latest
    # Only run for releases that start with astro-airflow-mcp
    if: startsWith(github.event.release.tag_name, 'astro-airflow-mcp-')
    permissions:
      contents: read

    defaults:
      run:
        working-directory: astro-airflow-mcp

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0  # Full history for hatch-vcs to read version from tags
          fetch-tags: true  # Explicitly fetch tags for version detection

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Extract version from tag
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Extract version from tag (e.g., astro-airflow-mcp-0.3.0 -> 0.3.0)
          VERSION="${RELEASE_TAG#astro-airflow-mcp-}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Build distribution packages
        run: uv build
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.version.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-packages
          path: astro-airflow-mcp/dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/astro-airflow-mcp
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist-packages
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
