name: "CLA Assistant"

on:
  issue_comment:
    types:
      - created
  pull_request_target:
    types:
     - opened
     - closed
     - synchronize

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  call-workflow:
    permissions:
      actions: write
      contents: read # signatures stored in remote .github repo via CLA_PAT
      pull-requests: write
      statuses: write
    uses: dash0hq/.github/.github/workflows/cla.yaml@main
    secrets:
      PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PAT }}
