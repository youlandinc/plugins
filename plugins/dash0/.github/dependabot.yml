version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 4
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 4
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
