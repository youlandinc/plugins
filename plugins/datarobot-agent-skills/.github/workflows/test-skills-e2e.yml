---
name: Test Skills E2E

on:
  pull_request:
    branches: [main]
    paths:
      - skills/**
      - tests/e2e/**
      - pyproject.toml
      - .github/workflows/test-skills-e2e.yml
  push:
    branches: [main]
    paths:
      - skills/**
      - tests/e2e/**
      - pyproject.toml
      - .github/workflows/test-skills-e2e.yml
  workflow_dispatch:
    inputs:
      force_all:
        description: Re-evaluate every skill (ignore hash cache)
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"

jobs:
  e2e:
    name: Skill quality evaluation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install e2e dependencies
        run: uv sync --group e2e

      - name: Restore skill hash cache
        uses: actions/cache/restore@v4
        with:
          path: tests/e2e/skill_hashes.json
          key: skill-hashes-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            skill-hashes-${{ github.ref_name }}-
            skill-hashes-main-

      - name: Run skill quality tests
        env:
          DATAROBOT_ENDPOINT: ${{ secrets.DATAROBOT_ENDPOINT }}
          DATAROBOT_API_TOKEN: ${{ secrets.DATAROBOT_API_TOKEN }}
          SKILLS_E2E_FORCE_ALL: ${{ github.event.inputs.force_all || '0' }}
        run: uv run --group e2e pytest tests/e2e/ -v --tb=short

      - name: Save skill hash cache
        if: ${{ !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: tests/e2e/skill_hashes.json
          key: skill-hashes-${{ github.ref_name }}-${{ github.run_id }}

      - name: Warn if committed hash cache is stale
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if ! git diff --quiet -- tests/e2e/skill_hashes.json; then
            echo "::warning::tests/e2e/skill_hashes.json is out of date. Run 'task test:e2e' locally and commit the refreshed file in a follow-up PR."
          fi
