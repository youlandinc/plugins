---
name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.1.0). Defaults to the version in package.json."
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          package-manager-cache: false

      # npm stage publish requires npm >= 11.15.0, newer than the npm bundled with Node 24.
      # Remove this step once setup-node's default Node ships npm >= 11.15.0.
      - name: Pin npm with staged-publishing support
        run: npm install -g npm@11.15.0

      - name: Publish
        run: npm stage publish --access public
