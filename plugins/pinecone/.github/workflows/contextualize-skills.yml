name: Contextualize Incoming Skills

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  contextualize:
    if: startsWith(github.head_ref, 'sync/skills-')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Skip if last commit was from bot
        id: check_author
        run: |
          AUTHOR=$(git log -1 --format='%an')
          if [ "$AUTHOR" = "github-actions[bot]" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code
        if: steps.check_author.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          claude_args: '--allowedTools "Read,Write,Edit,Bash(git:*),Bash(gh pr comment:*),Bash(mv:*)"'
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            You are adapting incoming Pinecone skill files for this plugin's conventions.

            1. Read `CLAUDE.md` in this repo — it describes exactly how skills should be structured here.
            2. Find the files changed in this PR (check the git diff against main).
            3. For each changed skill file, adapt it to match the conventions in CLAUDE.md.
               - Only modify `.md` files (SKILL.md, references/*.md, etc.)
               - Do NOT modify `.py` files in scripts/ directories — leave them exactly as they are
               - Do not change the meaning or content of the skills
               - Only change structure, formatting, field names, or terminology as needed
            4. Rename skill directories to strip the `pinecone-` prefix as described in CLAUDE.md.
               Use `git mv skills/pinecone-foo skills/foo` for each directory that has the prefix.
            5. Commit your changes directly to this branch with the message:
               "contextualize: adapt synced skills for this plugin"
            6. Post a single PR comment using `gh pr comment` summarizing:
               - What you changed in each file and why
               - What you intentionally left unchanged
               - Recommendations for manual changes the reviewer should consider
                 (e.g. existing slash commands or skills that may now be redundant given
                 the incoming skills — flag these for the reviewer but do NOT remove them yourself)

            Do not open a new PR. Do not modify files outside of the skills/ directory.
            Do not modify .claude-plugin/ files.

      - name: Create test marketplace
        if: steps.check_author.outputs.skip != 'true'
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          git pull --rebase origin $BRANCH
          mkdir -p test-marketplace/.claude-plugin
          jq -n --arg branch "$BRANCH" '{
            "name": "pinecone-plugins",
            "owner": {"name": "Pinecone"},
            "plugins": [{
              "name": "pinecone",
              "source": {
                "source": "github",
                "repo": "pinecone-io/pinecone-claude-code-plugin",
                "ref": $branch
              }
            }]
          }' > test-marketplace/.claude-plugin/marketplace.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-marketplace/.claude-plugin/marketplace.json
          git diff --staged --quiet || git commit -m "chore: add test marketplace for branch testing"
          git push origin HEAD:$BRANCH
